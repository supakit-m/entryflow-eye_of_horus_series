<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Eye of Horus simplified glyph -->
  <rect width="64" height="64" rx="12" fill="#09090F"/>
  <!-- Outer eye shape -->
  <ellipse cx="32" cy="30" rx="22" ry="12" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
  <!-- Pupil -->
  <circle cx="32" cy="30" r="7" fill="#D4AF37" opacity="0.9"/>
  <circle cx="32" cy="30" r="3.5" fill="#09090F"/>
  <!-- Horus teardrop mark -->
  <path d="M32 38 Q26 44 24 50 Q30 46 32 42 Q34 46 40 50 Q38 44 32 38Z"
        fill="#D4AF37" opacity="0.85"/>
  <!-- Decorative rays -->
  <line x1="10" y1="30" x2="4"  y2="30" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
  <line x1="54" y1="30" x2="60" y2="30" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
</svg>
